project_root: .
task2:
  calvin_raw_root: data/task2/calvin_raw/task_ABCD_D
  fps: 10
  action_dim: 7
  state_dim: 15
  scene_state_dim: 24
  image_keys:
    static: rgb_static
    wrist: rgb_gripper
  action_key_candidates:
    - rel_actions
    - actions
  state_key_candidates:
    - robot_obs
  scene_state_key_candidates:
    - scene_obs
  datasets:
    env_b:
      environments: [B]
      repo_id: cv_hw3/calvin_B
      root: data/task2/lerobot/calvin_B
    env_abc:
      environments: [A, B, C]
      repo_id: cv_hw3/calvin_ABC
      root: data/task2/lerobot/calvin_ABC
    env_d_validation:
      environments: [D]
      repo_id: cv_hw3/calvin_D_validation
      root: data/task2/lerobot/calvin_D_validation
  training:
    policy_type: act
    steps: 100000
    batch_size: 64
    num_workers: 8
    log_freq: 200
    save_freq: 10000
    eval_freq: 0
    wandb_enable: true
  evaluation:
    max_batches: 0
    batch_size: 16
